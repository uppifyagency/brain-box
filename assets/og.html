<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0a0a0a;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;color:#f4f1ea;position:relative;overflow:hidden;
background-image:linear-gradient(#1c1a16 1px,transparent 1px),linear-gradient(90deg,#1c1a16 1px,transparent 1px);background-size:40px 40px}
.in{padding:70px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between;position:relative}
.eyebrow{color:#d9ff3d;font-family:ui-monospace,Menlo,monospace;font-size:20px;letter-spacing:8px;font-weight:700}
h1{font-size:120px;font-weight:800;letter-spacing:-4px;line-height:1}
h1 .sq{color:#d9ff3d}
.tag{font-size:38px;color:#8a867c;line-height:1.25;max-width:22ch}
.tag b{color:#f4f1ea;font-weight:600}
.stats{display:flex;gap:56px}
.s b{display:block;font-size:44px;font-weight:800}
.s b.y{color:#d9ff3d}
.s span{color:#8a867c;font-size:19px}
.c1{position:absolute;top:28px;left:28px;width:44px;height:44px;border-top:4px solid #d9ff3d;border-left:4px solid #d9ff3d}
.c2{position:absolute;bottom:28px;right:28px;width:44px;height:44px;border-bottom:4px solid #d9ff3d;border-right:4px solid #d9ff3d}
</style></head><body>
<div class="c1"></div><div class="c2"></div>
<div class="in">
  <div>
    <p class="eyebrow">OPEN SOURCE · SELF-HOSTED · €0/MESE</p>
    <h1 style="margin-top:24px">BRAIN<span class="sq">■</span>BOX</h1>
    <p class="tag" style="margin-top:28px">Il cervello aziendale AI che vive <b>sul tuo server.</b></p>
  </div>
  <div class="stats">
    <div class="s"><b class="y">€0/mese</b><span>Oracle Cloud Free</span></div>
    <div class="s"><b>75 sec</b><span>drop → conoscenza</span></div>
    <div class="s"><b>10 formati</b><span>OCR e trascrizione</span></div>
    <div class="s"><b>100% privato</b><span>LLM locale</span></div>
  </div>
</div>
</body></html>
